<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Pong 3D - Babylon.js</title>
  <script src="https://yandex.ru/games/sdk/v2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #renderCanvas {
      width: 100%; height: 100%;
      touch-action: none;
      outline: none;
    }
    #hud {
      position: absolute; top: 16px; width: 100%;
      text-align: center; pointer-events: none;
      font-family: 'Courier New', monospace;
      color: #fff; font-size: 36px;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
      z-index: 10;
    }
    @media (orientation: portrait) {
      #hud { font-size: 28px; top: 8px; }
      #menu h1 { font-size: 32px; margin-bottom: 20px; }
      .menu-btn { width: 180px; font-size: 18px; padding: 12px 0; }
      #game-over h1 { font-size: 36px; }
    }
    #fps {
      position: absolute; bottom: 10px; right: 12px;
      font-family: monospace; color: rgba(0,255,0,0.7); font-size: 13px;
      pointer-events: none; line-height: 1.6; text-align: right;
    }
    #game-over {
      display: none;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; color: #fff;
      font-family: 'Courier New', monospace;
    }
    #game-over h1 { font-size: 48px; margin-bottom: 20px; }
    #btn-restart {
      padding: 12px 32px; font-size: 20px;
      background: #333; color: #fff; border: 2px solid #666;
      cursor: pointer; font-family: inherit;
    }
    #btn-restart:hover { background: #555; }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff; font-family: monospace; font-size: 20px;
    }
    #menu {
      display: none;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center; color: #fff;
      font-family: 'Courier New', monospace;
    }
    #menu h1 { font-size: 42px; margin-bottom: 30px; text-shadow: 0 0 20px rgba(100,150,255,0.5); }
    .menu-btn {
      display: block; width: 220px; margin: 10px auto;
      padding: 14px 0; font-size: 22px;
      background: #222; color: #fff; border: 2px solid #555;
      cursor: pointer; font-family: inherit;
      transition: background 0.2s;
    }
    .menu-btn:hover { background: #444; border-color: #888; }
    .menu-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    #status {
      display: none;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #aaa; font-family: monospace; font-size: 18px;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="hud" style="display:none;"></div>
  <div id="fps">FPS: --<br><span id="coins" style="color:#ffd700;">Coins: 0</span></div>
  <div id="loading">Загрузка...</div>
  <div id="menu">
    <h1>ПОНГ 3D</h1>
    <button class="menu-btn" id="btn-solo">СОЛО</button>
    <button class="menu-btn" id="btn-online">ОНЛАЙН</button>
    <div id="online-count" style="color:#aaa; font-size:14px; margin-top:12px;"></div>
  </div>
  <div id="status"></div>
  <div id="game-over">
    <h1 id="result-text"></h1>
    <button id="btn-restart">ИГРАТЬ СНОВА</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
